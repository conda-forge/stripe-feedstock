# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "15.1.0"
  python_check_max: "3.14"

package:
  name: stripe
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/stripe/stripe-${{ version }}.tar.gz
  sha256: 24bd3b6bd0969a4841bd4d7681556a9e35e46c414a07c8590a225fbd5a878450

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - flit-core >=3.11,<4
  run:
    - python >=${{ python_min }}
    - requests >=2.20
    - typing_extensions >=4.7.0

tests:
  - python:
      imports: stripe
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*

about:
  summary: Python bindings for the Stripe API
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/stripe
  repository: https://github.com/stripe/stripe-python

extra:
  recipe-maintainers:
    - bollwyvl
